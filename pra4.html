<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            /* it is like a image here that is why we use here background not
             background-color */
             background-repeat: no-repeat;
             height: 100vh;

        }
        .container{
            
            width: 650px;
            min-height: 400px;
            border: 2px solid white;
            background-color:white;
            margin: 100px auto;
            text-align: center;
            border-radius: 20px;
        }
        h1{
            padding-top: 20px;
            font-size: 55px;
            color: #0077b6;
            font-weight: 800;
        }
        #txt1{
            width: 490px;
            height: 65px;
            border-radius: 20px;
            font-size: 26px;
        }
        #btn{
            
            margin-top: 20px;
            width: 500px;
            height: 70px;
            border-radius: 20px;
            font-size: 26px;
            color: white;
            background: linear-gradient(to right,#4facfe,#0077b6);
            font-weight: 700;
        }
        #btn:hover{
            transform: scale(1.05);
            background: #025785;
            border: #339df9;
            transform: translateY(-3px);
            box-shadow: 0px 10px 20px lightslategray;

        }
        #txt1:hover{
            border:2px solid #339df9;
            outline: none;
            box-shadow: 0px 0px 10px lightslategray;
        }
        #res{
            font-size: 45px;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>✨ Magic Number Checker✨</h1>
        <div>
            <input type="number" id="txt1" placeholder="Enter a Number">
        </div>
        <div>
            <input type="button" id="btn" value="Check Magic Number" onclick="disp()">
        </div>
        <h1 id="res"></h1>
    </div>
</body>

    <script>
        function disp(){
        const n = parseInt(document.getElementById("txt1").value);

        if(isNaN(n)){
            document.getElementById("res").innerHTML = "⚠️Please enter a number";
            document.getElementById("res").style.color="#0077b6";
            return;
        }

        let temp = n;
        let sum = 0;

        while(temp > 0){
            let r = temp % 10;
            sum = sum + r;
            temp = Math.floor(temp/10);
        }
        let reverse = 0;
        let t= sum;

        while(t > 0){
            let r = t % 10;
            reverse = reverse * 10 + r;
            t = Math.floor(t/10);
        }

        if(sum * reverse == n){
            document.getElementById("res").innerHTML = `✅ ${n} is a magic number`;
            document.getElementById("res").style.color = "green";
        }
        else{
            document.getElementById("res").innerHTML = `❌ ${n} is not a magic number`;
            document.getElementById("res").style.color = "red";
        }
        }
    </script>

</html>
