<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
             background: linear-gradient(90deg, rgba(238, 130, 238, 1) 0%, rgba(0, 209, 255, 1) 100%);
        }
        .cont{
            width: 30%;
            min-height: 650px;
            border: 2px solid white;
            border: none;
            border-radius: 20px;
            margin: 150px auto;
            background-color: white;

        }
        #head{
            width: cover;
            height: 100px;
            color: white;
            font-size: 40px;
            font-weight: bolder;
            background-color: rgb(3, 197, 240);
            border-radius: 15px 15px 0px 0px;
            text-align: center;
            line-height: 2.5;

        }

        #c1, #c2{
            margin: 20px auto 6px 30px;
           
        }
        #txt1, #e1{
            width: 350px;
            height: 50px;
            border: 2px solid black;
            border-radius: 20px;
            margin-left: 45px;
            font-size: 25px;
            padding: 10px;
            outline: none;
        } 
        #btn{
            width: 350px;
            height: 60px;
            border: 2px solid white;
            border-radius: 20px;
            margin-left: 45px;
            font-size: 25px;
            padding: 10px;
            background-color: rgba(0, 209, 255, 1);
            color: white;
            margin-top: 30px;
        }
        #txt1:focus, #e1:focus{
            border: 4px solid rgba(0, 209, 255, 1);
            box-shadow: 0px 0px 20px gray;
        }
        #btn:hover{
            background-color:  rgb(5, 174, 212);
            transform: scale(1.08);
            box-shadow: 0px 10px 20px gray;
            border: none;
        }
        #sample, #res, #com{
            margin-top: 10px;
            margin-left: 45px;
            font-size: 28px;

        }

    </style>

</head>
<body>
    <div class="cont">
        <h1 id="head">📄Registration</h1>
    <p>
        <h1 id="c1">📲Contact number:</h1>
        <input type="text" id="txt1" placeholder="98 97 89 45 58">
        <h1 id="sample"></h1>
    </p>
    <p>
        <h1 id="c2">📧Email Id:</h1>
        <input type="email" id="e1" placeholder="Enter email">
        <h1 id="res"></h1>
    </p>
    
    <p>
        <input type="button" id="btn" value="Submit" onclick=" disp()">
    </p>
    <h1 id="com"></h1>

    </div>
    
</body>
<script>

    function disp() {
        const num = document.getElementById("txt1").value;
        let sam = /^[6-9]\d(\s\d{2}){4}$/;
        let valid_num = sam.test(num);

        const email = document.getElementById("e1").value;
        let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        let valid_email = pattern.test(email);

        if(valid_num){
            document.getElementById("sample").innerHTML = "✅ valid contact number";
            document.getElementById("sample").style.color = "green";
        }
        else{
            document.getElementById("sample").innerHTML = "❌ Please enter number like 98 89 78 45 58";
            document.getElementById("sample").style.color = "red";
        }

        
        
        if(valid_email){
            document.getElementById("res").innerHTML = "✅ valid email";
            document.getElementById("res").style.color = "green";
        }
        else{
            document.getElementById("res").innerHTML = "❌ Invalid email";
            document.getElementById("res").style.color = "red";
        }

        if(valid_num && valid_email){
            alert("🎉Registration Succesfull");
            // document.getElementById("com").innerHTML = "🎉 Successfull Submitted";
            document.getElementById("com").style.color = "green";
        }
        else{
            document.getElementById("com").innerHTML= "⛔Please Check all details";
            document.getElementById("com").style.color = "red";
        }
        
    }
    
    

</script>
</html>
