<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 1000px;
            height: 600px;
            border: 5px solid black;
            margin: 50px auto 0;
            padding: 10px;
            
        }
        .box-1{
            width: 100px;
            height: 100px;
            border: 5px solid black;
            float: left;
           
            
        }
        .box-2{
            width: 100px;
            height: 100px;
            border: 5px solid black;
            float: left;
            margin-left: 340px;    
        }
        
        .box-3{
            width: 100px;
            height: 100px;
            border: 5px solid black;
            float: right;
            
        }
        .box-mid{
            width: auto;
            height: 200px;
            border: 5px solid black;
            margin-top: 95px;
            padding: 20px;
            box-sizing: border-box;

            
        }
        .box-4{
            width: 100px;
            height: 100px;
            border: 5px solid black;
            float: left;
            margin-top: 76px;
            
        }
        .box-5{
            width: 100px;
            height: 100px;
            border: 5px solid black;
            float: left;
            margin-left: 340px;
            margin-top: 76px;
            
        }
        .box-6{
            width: 100px;
            height: 100px;
            border: 5px solid black;
            float: right;
            margin-top: 76px;
            
        }
        .clear-all{
            clear: both;
        }
        .box-mid-1{
            width: 420px;
            height: 100px;
            border: 5px solid black;
            float: left;
            margin-top: 20px;
            border-radius: 20px;

        }
        .box-mid-2{
            width: 420px;
            height: 100px;
            border: 5px solid black;
            float: right;
            margin-top: 20px;
            border-radius: 20px;

        }
        .shadow{
            box-shadow: 2px 2px 10px rgb(3, 3, 17);
        }
        

    </style>
</head>
<body>
    <div class="box shadow">
        <div class="box-1 shadow"></div>
        <div class="box-2 shadow"></div>
        <div class="box-3 shadow"></div>
        <br class="clear-all">
        <div class="box-mid">
            <div class="box-mid-1 shadow"></div>
            <div class="box-mid-2 shadow"></div>
            <br class="clear-all">
        </div>
        <div class="box-4 shadow"></div>
        <div class="box-5 shadow"></div>
        <div class="box-6 shadow"></div>
        <br class="clear-all">
    </div>
</body>
</html>
