<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* *{
            margin: 0;
            padding: 0;
        } */
        body{
            background:linear-gradient(135deg,#ff9a9e,#fad0c4);
            background-repeat: no-repeat;
            height: 100vh;
        }
        .container{
            width: 650px;
            height: 450px;
            border: 2px solid white;
            border-radius: 20px;
            margin:200px auto;
            background-color: white;
        }
        #txt1{
            width: 490px;
            height: 65px;
            border: 2px solid crimson;
            margin: 0px auto 0px 70px;
            border-radius: 20px;
            font-size: 24px;
            padding-left: 10px;
        }

        #btn{
            margin-top: 40px;
            width: 500px;
            height: 70px;
            border: 2px solid black;
            margin: 30px auto 10px 70px;
            border-radius: 20px;
            font-size: 28px;
            color: white;
            background-color: #e91e63;
            border: none;
        }
        h1{
            /* margin: 40px auto 30px 70px; */
            text-align: center;
            margin-top: 70px;
            color: palevioletred;
            font-size: 50px;
            font-weight: 700;
            color: crimson;
        }
        #btn:hover{
            background:#c2185b;
            transform: scale(1.05); 
            /* makes the element 1.03 times bigger */
        }
        #result{
            font-size: 30px;
            margin-top: 10px;
            text-align: center;
        }
    </style>

</head>
<body>
    <div class="container">
        
        <h1>Krishnamurthy number</h1>
        <div>
            <input
            type="number" 
            id="txt1" 
            placeholder="Enter a number">
        </div>
        <div>
            <input type="button" id="btn" value="Click Here" onclick="calc()">
        </div>
        <h2 id="result"></h2>
    </div>
</body>

    <script>
        function calc(){
        const n = parseInt(document.getElementById("txt1").value);
        if(isNaN(n)){
            document.getElementById("result").innerHTML = "⚠️Please enter a valid number";
            return;
        }
        let sum = 0;
        let temp= n;
        let r;

        while(temp > 0){
            r = temp % 10;
            fact = 1;
            for(i=1; i <=r; i++){
                fact = fact*i;
            }
            sum = sum + fact;
            temp = Math.floor(temp/10);
        }
        if(sum == n){
            document.getElementById("result").innerHTML = `✅ ${n} is a Krishnamurthy Number`;
            document.getElementById("result").style.color="green";
        }
        else{
            document.getElementById("result").innerHTML = `❌ ${n} is not a Krishnamurthy Number`;
            document.getElementById("result").style.color="red";
        }

        }

    </script>

</html>
