<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background: linear-gradient(135deg,#dbeafe,#f8fafc);
        }
        .container{
            width: 100%;
            max-width: 1360px;
            margin: auto;
            /* border: 10px solid black; */
        }
        .header{
            width: auto;
            height: 150px;
            border: 2px solid black;
            margin: 20px 30px 0px 30px ;

        }
        .head-inside{
            width: auto;
            height: 115px;
            border: 1px solid black;
            margin: 10px 10px 15px 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 2;
        }
        .left-bar{
            width: 300px;
            height: 600px;
            border: 2px solid black;
            margin: 30px 10px 0px 40px;
            float: left;
            text-align: center;
            font-size: 20px;
            line-height: 2;
        }
        .left-ins{
            width: auto;
            height: 400px;
            border: 1px solid black;
            border-radius: 10px;
            margin: 20px 20px 0px 15px;
            text-align: center;
            font-size: 20px;
            line-height: 2;
        }
        .mod-tit{
            width: auto;
            height: 40px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 1.5;
            margin: 2px 15px 0px 3px ;
        }
        .mod-cont{
            width: auto;
            height: 80px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 1.5;
            margin: 30px 15px 0px 4px;
        }
        .mod-item{
            width: auto;
            height: 150px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 1.5;
            margin: 30px 15px 0px 4px;
        }
        .content-holder{
            width: 550px;
            height: 400px;
            border: 2px solid black;
            margin: 30px 20px 0px 50px;
            float: left;
            text-align: center;
            line-height: 1.5;
            font-size: 20px;

        }
        .box-1{
            width: auto;
            height: 140px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 6.4;
            margin: 10px 20px 0px 15px;
        }
        .box-2{
            width: auto;
            height: 50px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height:2;
            margin: 15px 20px 0px 15px;
        }
        .box-3{
            width: auto;
            height: 50px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 2;
            margin: 15px 20px 0px 15px;
        }
        .box-4{
            width: auto;
            height: 50px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            line-height: 2;
            margin: 15px 20px 0px 15px;
        }


        .right-bar{
            width: 300px;
            height: 600px;
            border: 2px solid black;
            margin: 30px 40px 10px 20px;
            float: right;
            text-align: center;
            line-height: 1.5;
            font-size: 20px;

        }

        .middle{
            width: 550px;
            height: 163px;
            border: 2px solid black;
            margin: 30px 20px 0px 50px;
            float: left;
            text-align: center;
            line-height: 1.5;
            font-size: 20px;
        }

        .clear-all{
            clear: both;
        }
        .footer{
            width: auto;
            height: 70px;
            border: 2px solid black;
            margin: 30px 40px 10px 40px;
        }
        .foot-ins{
            width: auto;
            height: 54px;
            border: 1px solid black;
            margin: 3px 4px 5px 4px;
            border-radius: 10px;
            text-align: center;
            line-height: 1.5;
            font-size: 20px;

        }
        .shadow-gray{
            box-shadow: 13px 13px rgba(128, 128, 128, 0.967);
        }
        .shadow-graylight{
            box-shadow: 13px 13px rgb(169, 165, 165);
        }
        .shadow-pink{
            box-shadow: 13px 13px lightcoral;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header shadow-gray">
            <div class="head-inside">Header Control</div>
        </div>
        <div class="left-bar shadow-gray">Left Side Bar Holder
            <div class="left-ins">Module
                <div class="mod-tit shadow-pink">Module Title</div>
                <div class="mod-cont shadow-pink">Module Content</div>
                <div class="mod-item shadow-pink">Module Items <br>(featured page items)</div>
            </div>
        </div>
        <div class="content-holder shadow-gray">Content Holder
            <div class="box-1 shadow-pink">Page Content</div>
            <div class="box-2 shadow-pink">Page Item</div>
            <div class="box-3 shadow-pink">Page Item</div>
            <div class="box-4 shadow-pink">Page Item</div>
        </div>
        <div class="right-bar shadow-gray">Right Side Bar</div>
        <div class="middle shadow-gray">Middle Bar Holder</div>
        <br class="clear-all">
        <div class="footer shadow-graylight">
            <div class="foot-ins">Footer Control</div>
        </div>

    </div>
</body>
</html>
